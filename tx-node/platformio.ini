[env:tx_node]
platform      = espressif32
board         = esp32s3box
framework     = arduino

; Debug/Serial monitör hızı (MAVLink hattından bağımsız — bkz. packet.h MAVLINK_BAUD)
monitor_speed = 115200

lib_deps =
    https://github.com/mavlink/c_library_v2.git
    WiFi
    WebServer
    DNSServer
    Preferences

; WiFi/WebServer/DNSServer/Preferences (web config paneli) arduino-esp32 core'a
; dahildir, ekstra indirme gerekmez — ama common/ klasörü LDF'nin bilmediği bir
; -I yolu olduğundan (web_config.h oradan include ediliyor), LDF bu core
; kütüphanelerini otomatik bulamıyor; isimle burada belirtmek gerekiyor.

; common/ klasörünü her iki proje de paylaşır
; TX node pin atamaları (ESP32-S3-WROOM-1):
;   Pixhawk TELEM2 : GPIO16(RX<-TX), GPIO17(TX->RX) — packet.h default (MAVLINK_RX/TX_PIN)
;   E22 UART       : GPIO4(RX<-E22 TXD), GPIO5(TX->E22 RXD)
;   E22 M0/M1/AUX  : GPIO7 / GPIO8 / GPIO6
build_flags =
    -I../common
    -DLORA_ESP_TX_PIN=5
    -DLORA_ESP_RX_PIN=4
    -DLORA_M0_PIN=7
    -DLORA_M1_PIN=8
    -DLORA_AUX_PIN=6

upload_speed  = 921600
