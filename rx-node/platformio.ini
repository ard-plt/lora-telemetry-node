[env:rx_node]
platform      = espressif32
board         = esp32s3box
framework     = arduino

; Seri port hızı (pio monitor)
monitor_speed = 57600

; Kütüphaneler
lib_deps =
    https://github.com/mavlink/c_library_v2.git
    WiFi
    WebServer
    DNSServer
    Preferences
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO

; WiFi/WebServer/DNSServer/Preferences (web config paneli) arduino-esp32 core'a
; dahildir, ekstra indirme gerekmez — ama common/ klasörü LDF'nin bilmediği bir
; -I yolu olduğundan (web_config.h/oled_display.h oradan include ediliyor), LDF
; bu kütüphaneleri otomatik bulamıyor; isimle burada belirtmek gerekiyor. Adafruit
; SSD1306/GFX/BusIO ise gerçekten harici (core'a dahil değil) — OLED sinyal/durum
; göstergesi (sadece RX node) için gerekli.

; common/ klasörünü her iki proje de paylaşır
; RX node pin atamaları (ESP32-S3-WROOM-1):
;   E22 UART : GPIO5(TX→E22 RXD), GPIO4(RX←E22 TXD)
;   E22 M0   : GPIO7
;   E22 M1   : GPIO8
;   E22 AUX  : GPIO6
build_flags =
    -I../common
    -DLORA_ESP_TX_PIN=5
    -DLORA_ESP_RX_PIN=4
    -DLORA_M0_PIN=7
    -DLORA_M1_PIN=8
    -DLORA_AUX_PIN=6

; Upload hızı
upload_speed  = 921600

upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0